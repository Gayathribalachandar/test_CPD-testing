name: CI Build Matrix

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # Daily automation run (UTC) to keep build artifacts fresh.
    - cron: "15 2 * * *"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            gmsh

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (if present)
        run: |
          if [ -d tests ]; then
            python -m pytest tests/ -v
          else
            echo "No tests/ directory found; skipping unit tests."
          fi

  build-linux:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            gmsh \
            libglu1-mesa

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Linux artifact (PyInstaller)
        run: |
          chmod +x scripts/build_linux.sh
          ./scripts/build_linux.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPD-SimStudio-linux-${{ github.sha }}
          path: dist/CPD-SimStudio-linux/CPD-SimStudio/
          if-no-files-found: error

      - name: Package Linux zip
        run: |
          mkdir -p releases
          cd dist
          zip -r ../releases/CPD-SimStudio-linux.zip CPD-SimStudio-linux/CPD-SimStudio

      - name: Upload Linux zip package
        uses: actions/upload-artifact@v4
        with:
          name: CPD-SimStudio-linux-zip-${{ github.sha }}
          path: releases/CPD-SimStudio-linux.zip
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Windows artifact (PyInstaller)
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build_windows.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPD-SimStudio-win-${{ github.sha }}
          path: dist/CPD-SimStudio-win/CPD-SimStudio/
          if-no-files-found: error

      - name: Upload Windows zip package
        uses: actions/upload-artifact@v4
        with:
          name: CPD-SimStudio-win-zip-${{ github.sha }}
          path: releases/CPD-SimStudio-win.zip
          if-no-files-found: error
